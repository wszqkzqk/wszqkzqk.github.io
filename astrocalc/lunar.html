<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Calculator Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <a href="index.html" class="nav-link">← Home</a>
        <h1>Lunar Calculator</h1>
        <div style="display:flex; gap: 0.5rem;">
            <button id="btn-detect" class="secondary" style="width: auto;">📍 Auto-Detect Location</button>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="card">
                <div class="card-title">Observer Position</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Latitude (°)</label>
                        <input type="number" id="lat" value="0.00" step="0.01" min="-90" max="90">
                    </div>
                    <div class="form-group">
                        <label>Longitude (°)</label>
                        <input type="number" id="lon" value="0.00" step="0.01" min="-180" max="180">
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Timezone (UTC)</label>
                        <input type="number" id="tz" value="0" step="1" min="-12" max="14">
                    </div>
                    <div class="form-group">
                        <label>Refraction</label>
                        <input type="number" id="refraction" value="1.0" step="0.1" min="0" max="2">
                    </div>
                </div>
                <div id="geo-status">Using UTC+0 by default</div>
            </div>

            <div class="card">
                <div class="card-title">Observation Date</div>
                <div class="form-group">
                    <input type="date" id="date-picker">
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">Live Data</div>
                <div id="stats" class="info-display">
                    Hover over the curve to see exact elevation, distance, and moon phase data.
                </div>
            </div>
        </aside>

        <main class="chart-area">
            <canvas id="astroChart"></canvas>
        </main>
    </div>

    <script type="module">
        import { LunarCalculator } from './astro-core.js';

        const ctx = document.getElementById('astroChart').getContext('2d');
        let chart;

        const inputs = ['lat', 'lon', 'tz', 'date-picker', 'refraction'].map(id => document.getElementById(id));
        document.getElementById('date-picker').valueAsDate = new Date();

        const horizonPlugin = {
            id: 'horizonPlugin',
            beforeDraw: (chart) => {
                const { ctx, chartArea: { top, bottom, left, right }, scales: { y } } = chart;
                const zeroLine = y.getPixelForValue(0);
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--night-bg');
                ctx.fillRect(left, zeroLine, right - left, bottom - zeroLine);
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--day-bg');
                ctx.fillRect(left, top, right - left, zeroLine - top);
            }
        };

        function update() {
            const lat = parseFloat(document.getElementById('lat').value) || 0;
            const lon = parseFloat(document.getElementById('lon').value) || 0;
            const tz = parseFloat(document.getElementById('tz').value) || 0;
            const date = new Date(document.getElementById('date-picker').value);
            const refr = parseFloat(document.getElementById('refraction').value) || 0;

            const data = LunarCalculator.generateData(lat, lon, tz, date, refr);
            renderChart(data);
        }

        function renderChart(data) {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const textColor = isDark ? '#eeeeec' : '#2e3436';
            const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.05)';

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                plugins: [horizonPlugin],
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'Lunar Elevation (°)',
                        data: data.angles,
                        segment: {
                            borderColor: ctx => ctx.p0.parsed.y >= 0 && ctx.p1.parsed.y >= 0 ? '#62a0ea' : '#555',
                            borderDash: ctx => ctx.p0.parsed.y < 0 || ctx.p1.parsed.y < 0 ? [5, 5] : undefined
                        },
                        borderWidth: 3,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        pointHoverBackgroundColor: '#62a0ea',
                        fill: false,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            padding: 12,
                            callbacks: {
                                label: (item) => `Elevation: ${item.raw.toFixed(2)}°`,
                                footer: (items) => {
                                    const idx = items[0].dataIndex;
                                    return `Phase: ${data.phases[idx]}\nDistance: ${data.distances[idx].toFixed(0)} km`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { 
                            grid: { color: gridColor },
                            ticks: { color: textColor, maxTicksLimit: 12 }
                        },
                        y: { 
                            grid: { color: gridColor },
                            ticks: { color: textColor },
                            min: -90, max: 90
                        }
                    }
                }
            });
        }

        inputs.forEach(i => i.addEventListener('input', update));
        
        async function detectLocation() {
            const status = document.getElementById('geo-status');
            const btn = document.getElementById('btn-detect');
            btn.disabled = true;
            status.innerText = "Attempting to locate...";

            const getBrowserGeo = () => new Promise((res, rej) => {
                navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 });
            });

            try {
                const pos = await getBrowserGeo();
                document.getElementById('lat').value = pos.coords.latitude.toFixed(4);
                document.getElementById('lon').value = pos.coords.longitude.toFixed(4);
                status.innerText = "Located via Browser GPS";
            } catch (err) {
                try {
                    const resp = await fetch('https://ipapi.co/json/');
                    const ipData = await resp.json();
                    if (ipData.latitude) {
                        document.getElementById('lat').value = ipData.latitude.toFixed(2);
                        document.getElementById('lon').value = ipData.longitude.toFixed(2);
                        if (ipData.utc_offset) {
                            document.getElementById('tz').value = parseInt(ipData.utc_offset) / 100;
                        }
                        status.innerText = "Located via IP address";
                    }
                } catch (ipErr) {
                    status.innerText = "Detection failed. Please enter manually.";
                }
            } finally {
                btn.disabled = false;
                update();
            }
        }

        document.getElementById('btn-detect').onclick = detectLocation;
        update();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', update);
    </script>
</body>
</html>
