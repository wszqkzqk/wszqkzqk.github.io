<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Calculator Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <a href="index.html" class="nav-link">← Home</a>
        <h1>Solar Calculator</h1>
        <div style="display:flex; gap: 0.5rem;">
            <button id="btn-detect" class="secondary" style="width: auto;">📍 Auto-Detect Location</button>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="card">
                <div class="card-title">Observer Position</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Latitude (°)</label>
                        <input type="number" id="lat" value="0.00" step="0.01" min="-90" max="90">
                    </div>
                    <div class="form-group">
                        <label>Longitude (°)</label>
                        <input type="number" id="lon" value="0.00" step="0.01" min="-180" max="180">
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Timezone (UTC)</label>
                        <input type="number" id="tz" value="0" step="1" min="-12" max="14">
                    </div>
                    <div class="form-group">
                        <label>Refraction</label>
                        <input type="number" id="refraction" value="1.0" step="0.1" min="0" max="2">
                    </div>
                </div>
                <div id="geo-status">Using UTC+0 by default</div>
            </div>

            <div class="card">
                <div class="card-title">Observation Date</div>
                <div class="form-group">
                    <input type="date" id="date-picker">
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">Live Data</div>
                <div id="stats" class="info-display">
                    Hover over the curve to see exact elevation and distance data for that time.
                </div>
            </div>
        </aside>

        <main class="chart-area">
            <canvas id="astroChart"></canvas>
        </main>
    </div>

    <script type="module">
        import { SolarCalculator } from './astro-core.js';
        import { initAstroApp } from './astro-ui.js';

        initAstroApp(
            SolarCalculator,
            'Solar Elevation (°)',
            '#ff9500', // Orange for Solar
            (data, idx) => `Distance: ${data.distances[idx].toExponential(3)} km`
        );
    </script>
</body>
</html>
